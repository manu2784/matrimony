services:
  api:
    build:
      context: ./api
      target: dev
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_NAME: ${DB_NAME:-matrimony-dev-db}
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:3000
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    ports:
      - "8080:5173"
    restart: unless-stopped

volumes:
  api_node_modules:
  web_node_modules:
